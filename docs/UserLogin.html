<!DOCTYPE html>

<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SnapSnout - Login</title>
    <!-- Google Fonts -->

    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "outline-variant": "#babaaf",
                        "primary-container": "#ffae7f",
                        "on-primary-fixed-variant": "#733300",
                        "primary": "#9a511e",
                        "surface": "#fffcf7",
                        "on-surface": "#373831",
                        "on-error-container": "#671200",
                        "surface-container-highest": "#eae9dd",
                        "on-tertiary-fixed-variant": "#00436a",
                        "tertiary-fixed": "#84bef3",
                        "surface-tint": "#9a511e",
                        "secondary-container": "#ffe174",
                        "background": "#fffcf7",
                        "surface-bright": "#fffcf7",
                        "on-primary-fixed": "#451c00",
                        "on-tertiary-fixed": "#00223a",
                        "primary-fixed": "#ffae7f",
                        "on-secondary": "#ffffff",
                        "secondary": "#776300",
                        "tertiary": "#286999",
                        "secondary-dim": "#695700",
                        "on-secondary-container": "#625000",
                        "on-tertiary-container": "#003a5c",
                        "on-secondary-fixed-variant": "#6d5a00",
                        "on-secondary-fixed": "#4c3e00",
                        "inverse-primary": "#f69a62",
                        "tertiary-container": "#84bef3",
                        "surface-container-low": "#fcf9f3",
                        "surface-variant": "#eae9dd",
                        "inverse-surface": "#0e0e0c",
                        "secondary-fixed": "#ffe174",
                        "on-tertiary": "#ffffff",
                        "error-dim": "#821a01",
                        "on-surface-variant": "#64655c",
                        "on-primary-container": "#652c00",
                        "on-primary": "#ffffff",
                        "on-background": "#373831",
                        "on-error": "#ffffff",
                        "error": "#b23d21",
                        "outline": "#818178",
                        "inverse-on-surface": "#9e9d98",
                        "primary-fixed-dim": "#f99d64",
                        "tertiary-fixed-dim": "#77b0e5",
                        "surface-container-high": "#f0eee4",
                        "primary-dim": "#8b4513",
                        "surface-dim": "#e4e3d6",
                        "error-container": "#fa7150",
                        "surface-container-lowest": "#ffffff",
                        "tertiary-dim": "#165c8c",
                        "secondary-fixed-dim": "#f6d241",
                        "surface-container": "#f6f4ec"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Space Grotesk"]
                    },
                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }

        .irregular-radius-1 {
            border-radius: 32px 28px 30px 34px;
        }

        .irregular-radius-2 {
            border-radius: 28px 34px 31px 29px;
        }

        .blueprint-grid {
            background-size: 20px 20px;
            background-image: radial-gradient(circle, #28699915 1px, transparent 1px);
        }

        .tactile-button {
            box-shadow: 0px 8px 0px #6d5a00, 0px 12px 20px rgba(119, 99, 0, 0.2);
            transition: all 0.1s ease;
        }

        .tactile-button:active {
            transform: translateY(4px);
            box-shadow: 0px 4px 0px #6d5a00, 0px 6px 10px rgba(119, 99, 0, 0.2);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col overflow-x-hidden">
    <!-- TopAppBar (Shared Component) -->
    <header
        class="w-full top-0 sticky z-50 bg-[#fffcf7] dark:bg-stone-950 no-border tonal-shift bg-stone-100/50 dark:bg-stone-900/50 flex items-center justify-center px-6 py-4">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-[#9a511e] dark:text-orange-400" data-icon="pets">pets</span>
            <h1
                class="font-['Plus_Jakarta_Sans'] font-black tracking-tight text-2xl text-[#9a511e] dark:text-orange-500">
                SnapSnout</h1>
        </div>
    </header>
    <main class="flex-grow flex flex-col items-center justify-center px-8 py-12 relative">
        <!-- Background Blueprint Elements -->
        <div class="absolute inset-0 blueprint-grid pointer-events-none opacity-40"></div>
        <div
            class="absolute top-20 right-[-20px] w-40 h-40 border-2 border-tertiary/10 rounded-full flex items-center justify-center opacity-20 pointer-events-none">
            <div class="w-32 h-32 border border-tertiary/20 rounded-full border-dashed"></div>
        </div>
        <!-- Content Canvas -->
        <div class="w-full max-w-sm z-10">
            <!-- Naive Header -->
            <div class="mb-12 text-center md:text-left">
                <h2 class="font-headline text-5xl font-black text-on-surface tracking-tighter leading-none mb-4">
                    Welcome <br /> <span class="text-primary italic">Back</span>
                </h2>
                <div class="flex items-center gap-2">
                    <div class="h-[2px] w-12 bg-secondary-container"></div>
                    <p class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant">Access your field
                        notes</p>
                </div>
            </div>
            <!-- Login Form -->
            <form class="space-y-6" onsubmit="return false;">
                <!-- Email Input -->
                <div class="space-y-2 group">
                    <label
                        class="font-label text-xs uppercase tracking-widest text-on-surface-variant ml-2">Identifier_Email</label>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-container-lowest irregular-radius-1 border-2 border-outline/20 py-5 px-6 focus:ring-0 focus:border-tertiary transition-colors font-body text-on-surface placeholder:text-outline/40"
                            placeholder="scout@snapsnout.com" type="email" />
                        <span
                            class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-tertiary/30">alternate_email</span>
                    </div>
                </div>
                <!-- Password Input -->
                <div class="space-y-2 group">
                    <div class="flex justify-between items-center px-2">
                        <label
                            class="font-label text-xs uppercase tracking-widest text-on-surface-variant">Security_Key</label>
                        <a class="font-label text-[10px] uppercase tracking-tighter text-tertiary hover:underline"
                            href="#">Lost_Access?</a>
                    </div>
                    <div class="relative">
                        <input
                            class="w-full bg-surface-container-lowest irregular-radius-2 border-2 border-outline/20 py-5 px-6 focus:ring-0 focus:border-tertiary transition-colors font-body text-on-surface"
                            placeholder="••••••••" type="password" />
                        <span
                            class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-tertiary/30">key</span>
                    </div>
                </div>
                <!-- Tactile Button -->
                <div class="pt-4">
                    <button
                        class="w-full bg-secondary-fixed py-5 rounded-xl font-headline text-xl font-black text-on-secondary-fixed tactile-button flex items-center justify-center gap-3"
                        type="submit">
                        <span>Login</span>
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
                    </button>
                </div>
            </form>
            <!-- Decorative Sketch/Doodle -->
            <div class="mt-16 flex flex-col items-center">
                <div class="relative p-6 bg-surface-container-low irregular-radius-1 mb-8 overflow-hidden">
                    <div class="absolute inset-0 blueprint-grid opacity-20"></div>
                    <div class="relative z-10 flex flex-col items-center gap-2">
                        <!-- Asymmetric "Sketch" of a dog silhouette using Material symbols + layout -->
                        <div class="flex items-end gap-1 mb-2">
                            <span class="material-symbols-outlined text-primary text-4xl"
                                style="font-variation-settings: 'FILL' 1;">pets</span>
                            <div
                                class="mb-1 w-8 h-[1px] bg-tertiary-fixed border-dashed border-t border-tertiary opacity-40">
                            </div>
                            <span class="font-label text-[10px] text-tertiary rotate-90 origin-left">REF_092</span>
                        </div>
                        <p class="font-body text-sm text-on-surface-variant text-center max-w-[180px] italic">
                            "Your snout-scouting adventures are ready for documentation."
                        </p>
                    </div>
                </div>
                <!-- Secondary Navigation -->
                <div class="text-center space-y-4">
                    <p class="font-body text-on-surface-variant text-sm">
                        Not part of the pack yet?
                    </p>
                    <a class="inline-block font-label text-xs uppercase tracking-[0.25em] text-primary font-bold hover:opacity-70 transition-opacity"
                        href="#">
                        Initialize_New_Account
                    </a>
                </div>
            </div>
        </div>
        <!-- Footer Decorative Tech Detail -->
        <div class="mt-12 flex items-center gap-4 opacity-30">
            <div class="h-px flex-grow bg-outline-variant"></div>
            <span class="font-label text-[10px] uppercase tracking-widest">Protocol V.2.04 Gaia</span>
            <div class="h-px flex-grow bg-outline-variant"></div>
        </div>
    </main>
    <!-- Image/Graphic placeholder - Semantic check -->
    <div class="hidden">
        <img data-alt="a hand-drawn minimalist pencil sketch of a happy golden retriever silhouette on aged parchment paper with architectural blueprint grid lines"
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7-JZt4BmauDe-ZhsT_4_rg1FCRgeu20ZJnh1sMrkhvNHXKLuDKfLbWJ-X-GH05BQ1WN58JN51K0rfRgcDG4CDnCtV8vPOIdaJiwPQXGwjdfXTyu1H497zYvCM3zDDLsj_xGPqp8EYbV8PRKKeSP5BbI5zkw0-VUTAgERe42blKjWlFHcbDPr2Y-Ir_2G7jD0g_96Ddbkbpw0tepa7Mmdemqvgfwunzl3DIIw3xa3ods4_m5_u7mQSozFQltBSPoCW8YHofpmi-Z2d" />
    </div>
</body>

</html>
