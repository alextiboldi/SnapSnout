<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>SnapSnout - Forgot Your Key?</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link

                        "surface-container": "#f6f4ec",
                        "on-error-container": "#671200",
                        "on-primary-fixed": "#451c00",
                        "error": "#b23d21",
                        "primary-container": "#ffae7f",
                        "surface-bright": "#fffcf7",
                        "primary-dim": "#8b4513",
                        "secondary-fixed": "#ffe174",
                        "surface-container-low": "#fcf9f3",
                        "inverse-primary": "#f69a62",
                        "secondary": "#776300",
                        "on-primary": "#ffffff",
                        "inverse-on-surface": "#9e9d98",
                        "on-tertiary-fixed-variant": "#00436a",
                        "on-tertiary-container": "#003a5c",
                        "background": "#fffcf7",
                        "tertiary-dim": "#165c8c",
                        "on-surface": "#373831",
                        "secondary-dim": "#695700",
                        "surface-container-highest": "#eae9dd",
                        "tertiary-fixed": "#84bef3",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary-fixed-variant": "#6d5a00",
                        "surface-dim": "#e4e3d6",
                        "secondary-fixed-dim": "#f6d241",
                        "surface-variant": "#eae9dd",
                        "outline": "#818178",
                        "inverse-surface": "#0e0e0c",
                        "on-secondary-fixed": "#4c3e00",

                        "on-tertiary-fixed": "#00223a"

                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],

                    borderRadius: { "DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px" },

    <style>
        .blueprint-grid {
            background-image: radial-gradient(circle, #28699915 1px, transparent 1px);
            background-size: 24px 24px;
        }

        .naive-border {
            border-radius: 32px 28px 30px 34px;
        }

        .sculpted-shadow {
            box-shadow: 0px 4px 0px #6d5a00, 0px 8px 16px rgba(154, 81, 30, 0.15);
        }

        .sculpted-shadow:active {
            box-shadow: 0px 1px 0px #6d5a00;
            transform: translateY(3px);
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body
    class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 blueprint-grid">
    <!-- Brand Header (TopAppBar Contextual Logic) -->
    <header class="fixed top-0 left-0 w-full flex items-center justify-between px-6 py-6">
        <div class="flex items-center gap-2">
            <span class="material-symbols-outlined text-primary text-3xl">pets</span>
            <span class="font-headline font-black text-2xl tracking-tighter text-primary">SnapSnout</span>
        </div>
    </header>
    <!-- Main Content Canvas -->
    <main class="w-full max-w-md flex flex-col items-center gap-12 mt-12">
        <!-- Illustration / Visual Anchor -->
        <div
            class="relative w-48 h-48 bg-surface-container-high naive-border flex items-center justify-center overflow-hidden">
            <div class="absolute inset-0 opacity-10 blueprint-grid"></div>
            <img class="w-32 h-32 object-cover rounded-full grayscale mix-blend-multiply opacity-80"
                data-alt="a confused looking dog tilting its head to the side, warm sunlit room, hand-drawn architectural blueprints scattered on the floor"
                src="https://lh3.googleusercontent.com/aida-public/AB6AXuAgu0iXRuislrz74_oIhqU5v2RJ4zexYw6A7hB-shbgKazucQ0o6DJ4T-UVnbPu7ISSTbeI0Nn2n0PSRZ69bLqW9P_J6cHzArcWGI_H0gT24tK6q3rpXMGZqQfPVn3YxU0NmpcCQiKmyrmDod_CrkmTQXiVy5AgfTWA27-6J0gkzXPvKGp4G7q44_Ys_qwle8Yuk1tR4vVt8pzj2LlXtNTT_7OQVLjI7SWnSPRj6y-0uUjhRrVvpMqAQLmGEJsJb8ixgaiMVRjTcWf0" />
            <div class="absolute -top-2 -right-2 bg-secondary-fixed p-3 rounded-full shadow-lg">
                <span class="material-symbols-outlined text-on-secondary-fixed">key</span>
            </div>
        </div>
        <!-- Typography Section -->
        <div class="text-center space-y-3">
            <h1 class="font-headline text-5xl font-extrabold text-primary tracking-tight leading-tight">
                Forgot Your Key?
            </h1>
            <p class="font-body text-on-surface-variant text-lg max-w-[280px] mx-auto">
                No worries, we'll help you re-calibrate your access.
            </p>
        </div>
        <!-- Form Section -->
        <div class="w-full space-y-8">
            <div class="space-y-2">
                <label class="font-label text-[10px] uppercase tracking-[0.2em] text-outline font-bold px-4">
                    IDENTIFIER_EMAIL
                </label>
                <div class="relative group">
                    <input
                        class="w-full bg-surface-container-lowest naive-border border-2 border-outline/20 px-6 py-5 text-on-surface placeholder:text-outline-variant focus:outline-none focus:border-tertiary transition-all duration-300"
                        placeholder="Enter your registered email" type="email" />
                    <span
                        class="material-symbols-outlined absolute right-6 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-tertiary transition-colors">
                        alternate_email
                    </span>
                </div>
            </div>
            <!-- CTA -->
            <button
                class="w-full bg-gradient-to-b from-secondary-fixed to-secondary-fixed-dim py-5 rounded-xl font-headline font-bold text-on-secondary-fixed text-xl sculpted-shadow transition-all duration-200 flex items-center justify-center gap-3">
                Request New Key
                <span class="material-symbols-outlined font-bold">rocket_launch</span>
            </button>
        </div>
        <!-- Navigation Footer -->
        <footer class="mt-8">
            <a class="flex items-center gap-2 font-label text-[10px] uppercase tracking-[0.2em] text-outline hover:text-primary transition-colors font-bold group"
                href="#">
                <span
                    class="material-symbols-outlined text-sm group-hover:-translate-x-1 transition-transform">arrow_back</span>
                RETURN_TO_LOGIN_PROTOCOL
            </a>
        </footer>
    </main>
    <!-- Decorative Schematic Detail -->
    <div class="fixed bottom-8 left-8 hidden lg:block">
        <div class="font-label text-[8px] uppercase text-tertiary-fixed-dim leading-relaxed opacity-50">
            SEC_PROTOCOL: PW_RECOVERY_INIT<br />
            COORDS: 45.322 // -122.677<br />
            STATUS: AWAITING_IDENTIFIER
        </div>
    </div>
    <!-- Background Elements -->
    <div class="fixed top-20 right-[-100px] w-64 h-64 bg-secondary-container/10 blur-[100px] rounded-full -z-10"></div>
    <div class="fixed bottom-20 left-[-100px] w-80 h-80 bg-tertiary-container/10 blur-[120px] rounded-full -z-10"></div>
</body>

</html>
